  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d2230;
      --line: #2a3142;
      --text: #e6e9ef;
      --muted: #8a93a6;
      --accent: #ffb86b;
      --accent-2: #7cc4ff;
      --warn: #ff7a7a;
      --ok: #6fcf97;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .app { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 1fr auto; height: 100vh; }
    .sidebar { grid-row: 1 / span 2; background: var(--panel); border-right: 1px solid var(--line); overflow: hidden; display: flex; flex-direction: column; }
    .sidebar h1 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0; padding: 14px 16px 8px; }
    .candidate-list { flex: 1; overflow-y: auto; }
    .candidate { padding: 10px 16px; border-bottom: 1px solid var(--line); cursor: pointer; }
    .candidate:hover { background: var(--panel-2); }
    .candidate.active { background: var(--panel-2); border-left: 3px solid var(--accent); padding-left: 13px; }
    .candidate .id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--muted); }
    .candidate .label { font-weight: 500; margin: 2px 0; }
    .candidate .meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; }
    .candidate .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .badge.reviewed { background: rgba(111, 207, 151, 0.15); color: var(--ok); }
    .badge.draft { background: rgba(138, 147, 166, 0.15); color: var(--muted); }
    .map-wrap { position: relative; }
    #map { width: 100%; height: 100%; }
    .map-overlay { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
    .map-overlay .pill { background: rgba(22, 26, 34, 0.9); border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--muted); pointer-events: auto; }
    .map-overlay .pill b { color: var(--text); }
    .drawer { grid-column: 2; background: var(--panel); border-top: 1px solid var(--line); max-height: 40vh; overflow-y: auto; padding: 16px 20px; }
    .drawer h2 { margin: 0 0 4px; font-size: 16px; }
    .drawer .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
    .facts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .fact { background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; }
    .fact .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .fact .v { font-size: 14px; font-weight: 500; }
    form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
    form .row.full { grid-template-columns: 1fr; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px; }
    input[type="text"], input[type="date"], textarea { width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--text); padding: 8px 10px; border-radius: 4px; font: inherit; font-family: inherit; }
    textarea { min-height: 60px; resize: vertical; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .hint.warn { color: var(--warn); }
    .actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
    button { background: var(--accent); color: #1a1a1a; border: 0; padding: 8px 14px; border-radius: 4px; font-weight: 500; cursor: pointer; font: inherit; }
    button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
    button.danger { background: var(--warn); color: #1a1a1a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .toolbar { padding: 8px 16px; border-top: 1px solid var(--line); display: flex; gap: 8px; }
    .toolbar .spacer { flex: 1; }
    .status { font-size: 11px; color: var(--muted); align-self: center; }
    .preview { background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; padding: 10px; max-height: 200px; overflow: auto; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; white-space: pre; }
    .errors { background: rgba(255, 122, 122, 0.1); border: 1px solid var(--warn); border-radius: 4px; padding: 8px 10px; margin: 8px 0; font-size: 12px; color: var(--warn); }
    .empty { padding: 40px 20px; text-align: center; color: var(--muted); }
    .maplibregl-popup-content { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); font: 12px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; padding: 8px 10px; }
    .maplibregl-popup-tip { border-top-color: var(--line) !important; border-bottom-color: var(--line) !important; }
  </style>
</head>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
  (() => {
    'use strict';

    // ---------- Load data ----------
    const dataEl = document.getElementById('candidate-data');
    const packet = JSON.parse(dataEl.textContent);
    const candidates = packet.candidates;
    const sourceArtifact = packet.sourceArtifact;
    const generatorVersion = packet.candidateGeneratorVersion;

    // ---------- Map ----------
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '© OpenStreetMap contributors'
          }
        },
        layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
      },
      center: [-123.12, 49.25],
      zoom: 11
    });
    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    // ---------- State ----------
    const state = {
      activeId: null,
      drafts: new Map(), // candidateId -> reviewed trail object
      approved: new Set(),
    };

    // ---------- Sidebar list ----------
    const listEl = document.getElementById('list');
    function renderList() {
      listEl.innerHTML = '';
      candidates.forEach((c, idx) => {
        const draft = state.drafts.get(c.id);
        const isApproved = state.approved.has(c.id);
        const el = document.createElement('div');
        el.className = 'candidate' + (state.activeId === c.id ? ' active' : '');
        const badge = isApproved
          ? '<span class="badge reviewed">approved</span>'
          : draft
            ? '<span class="badge draft">draft</span>'
            : '<span class="badge draft">—</span>';
        // label format: generated-giant-measurements-<latCell>:<lngCell>
        const cellMatch = String(c.label).match(/-(\d+):(-?\d+)$/);
        const latCell = cellMatch ? cellMatch[1] : '?';
        const lngCell = cellMatch ? cellMatch[2] : '?';
        el.innerHTML = `
          <div class="id">${c.id} ${badge}</div>
          <div class="label">#${idx + 1} · cell lat${latCell} lng${lngCell}</div>
          <div class="meta">
            <span>${c.waypointTreeIds.length} trees</span>
            <span>${c.distance.value.toFixed(0)} m</span>
            <span>score ${c.valueScore.total.toFixed(1)}</span>
          </div>
        `;
        el.addEventListener('click', () => select(c.id));
        listEl.appendChild(el);
      });
      const approvedCount = state.approved.size;
      const draftCount = state.drafts.size - approvedCount;
      document.getElementById('status').textContent =
        `${approvedCount} approved · ${Math.max(0, draftCount)} drafted`;
    }

    // ---------- Map layers ----------
    map.on('load', () => {
      map.addSource('all-trees', {
        type: 'geojson',
        data: allTreesGeoJSON()
      });
      map.addSource('active-candidate', {
        type: 'geojson',
        data: emptyFC()
      });
      map.addSource('active-route', {
        type: 'geojson',
        data: emptyFC()
      });

      map.addLayer({
        id: 'all-trees-pt',
        type: 'circle',
        source: 'all-trees',
        paint: {
          'circle-radius': 3,
          'circle-color': '#8a93a6',
          'circle-opacity': 0.6
        }
      });
      map.addLayer({
        id: 'active-route-line',
        type: 'line',
        source: 'active-route',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': '#ffb86b',
          'line-width': 3,
          'line-dasharray': [1, 1]
        }
      });
      map.addLayer({
        id: 'active-tree-pt',
        type: 'circle',
        source: 'active-candidate',
        paint: {
          'circle-radius': 7,
          'circle-color': '#ffb86b',
          'circle-stroke-color': '#0f1115',
          'circle-stroke-width': 2
        }
      });

      // Click handlers
      map.on('click', 'active-tree-pt', (e) => {
        const f = e.features[0];
        new maplibregl.Popup({ closeButton: true })
          .setLngLat(f.geometry.coordinates)
          .setHTML(`
            <b>Tree ${f.properties.treeId}</b><br>
            height ${f.properties.heightM} m · ⌀${f.properties.diameterCm} cm<br>
            score ${f.properties.score}
          `)
          .addTo(map);
      });
      map.on('mouseenter', 'active-tree-pt', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'active-tree-pt', () => map.getCanvas().style.cursor = '');

      renderList();
    });

    function allTreesGeoJSON() {
      const features = [];
      for (const c of candidates) {
        for (const w of c.waypoints) {
          features.push({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [w.longitude, w.latitude] },
            properties: { treeId: w.treeId, candidateId: c.id }
          });
        }
      }
      return { type: 'FeatureCollection', features };
    }
    function emptyFC() { return { type: 'FeatureCollection', features: [] }; }
    function activeTreeFC(c) {
      return {
        type: 'FeatureCollection',
        features: c.waypoints.map(w => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [w.longitude, w.latitude] },
          properties: {
            treeId: w.treeId,
            heightM: w.scoreComponents.heightM,
            diameterCm: w.scoreComponents.diameterCm,
            score: w.scoreComponents.total
          }
        }))
      };
    }
    function activeRouteFC(c) {
      if (!c || c.waypoints.length < 2) return emptyFC();
      return {
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: {
            type: 'LineString',
            coordinates: c.waypoints.map(w => [w.longitude, w.latitude])
          },
          properties: {}
        }]
      };
    }

    // ---------- Selection ----------
    function select(id) {
      state.activeId = id;
      const c = candidates.find(x => x.id === id);
      if (!c) return;
      const lngs = c.waypoints.map(w => w.longitude);
      const lats = c.waypoints.map(w => w.latitude);
      const bounds = [
        Math.min(...lngs), Math.min(...lats),
        Math.max(...lngs), Math.max(...lats)
      ];
      map.fitBounds(bounds, { padding: 80, maxZoom: 15, duration: 600 });
      map.getSource('active-candidate').setData(activeTreeFC(c));
      map.getSource('active-route').setData(activeRouteFC(c));
      document.getElementById('overlay-info').innerHTML =
        `<b>${c.id}</b> · ${c.waypointTreeIds.length} trees · ${c.distance.value.toFixed(0)} m (straight line, not walking)`;
      renderList();
      renderDrawer(c);
    }

    // ---------- Form rendering ----------
    const FORBIDDEN_NARRATIVE = /\b(accessible|accessibility|safe|safety|walkable|walkability|walking route|pedestrian-safe|permission|edible|bloom|harvest)\b/i;
    const FORBIDDEN_REVIEWER = /\b(ai|agent|model)\b/i;

    function renderDrawer(c) {
      const drawer = document.getElementById('drawer');
      const draft = state.drafts.get(c.id) || blankDraft(c);
      const waypointRows = c.waypoints.map((w, i) =>
        `<tr>
          <td>${i + 1}</td>
          <td><code>${w.treeId}</code></td>
          <td>${w.latitude.toFixed(5)}, ${w.longitude.toFixed(5)}</td>
          <td>${w.scoreComponents.heightM} m</td>
          <td>${w.scoreComponents.diameterCm} cm</td>
          <td>${w.scoreComponents.total.toFixed(2)}</td>
        </tr>`
      ).join('');

      const exportAnchorJson = JSON.stringify(
        c.waypoints.slice(0, 2).map(w => ({ treeId: w.treeId, latitude: Number(w.latitude), longitude: Number(w.longitude) })),
        null, 2
      );

      drawer.innerHTML = `
        <h2>${c.id} <span class="badge draft" style="font-size:10px; padding:2px 6px; border-radius:3px; background: rgba(138,147,166,.15); color: var(--muted);">candidate</span></h2>
        <div class="sub">${c.label} · theme: ${c.theme} · cell grouping only, not pedestrian routing</div>

        <div class="facts">
          <div class="fact"><div class="k">Waypoints</div><div class="v">${c.waypointTreeIds.length}</div></div>
          <div class="fact"><div class="k">Distance</div><div class="v">${c.distance.value.toFixed(0)} m</div></div>
          <div class="fact"><div class="k">Value score</div><div class="v">${c.valueScore.total.toFixed(1)}</div></div>
          <div class="fact"><div class="k">Distance note</div><div class="v" style="font-size:12px;">straight-line haversine · <span style="color:var(--warn)">not walking distance</span></div></div>
        </div>

        <h3 style="font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin: 16px 0 6px;">Waypoints (proposed order)</h3>
        <table style="width:100%; border-collapse:collapse; font-size:12px; margin-bottom:16px;">
          <thead>
            <tr style="text-align:left; color:var(--muted); border-bottom:1px solid var(--line);">
              <th style="padding:4px 6px;">#</th><th>Tree</th><th>Lat, Lng</th><th>Height</th><th>DBH</th><th>Score</th>
            </tr>
          </thead>
          <tbody>${waypointRows}</tbody>
        </table>

        <h3 style="font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin: 16px 0 6px;">Approval form</h3>
        <form id="approval-form">
          <div class="row">
            <div>
              <label>Trail name (human-authored)</label>
              <input type="text" name="name" value="${escapeAttr(draft.name || '')}" placeholder="e.g. Queen Elizabeth Park giants" />
              <div class="hint">Short, location-based, not aspirational.</div>
            </div>
            <div>
              <label>Reviewer name (must be a real human)</label>
              <input type="text" name="reviewer" value="${escapeAttr(draft.review.reviewer || '')}" placeholder="e.g. Your name" />
              <div class="hint" id="reviewer-hint">Cannot contain: ai, agent, model.</div>
            </div>
          </div>
          <div class="row">
            <div>
              <label>Reviewed date</label>
              <input type="date" name="reviewedAt" value="${escapeAttr(draft.review.reviewedAt || new Date().toISOString().slice(0, 10))}" />
            </div>
            <div>
              <label>Status</label>
              <input type="text" value="human-reviewed" disabled />
              <div class="hint">This is the only accepted value; the gate rejects any other status.</div>
            </div>
          </div>
          <div class="row full">
            <div>
              <label>Narrative (waypoint-oriented, no claims of access/safety/walkability)</label>
              <textarea name="narrative" placeholder="A short description of the trees in proposed visit order, grounded in the measured facts. Do not describe the route as accessible, safe, walkable, edible, etc.">${escapeText(draft.narrative || '')}</textarea>
              <div class="hint" id="narrative-hint">Forbidden words: accessible, safe, walkable, walking route, pedestrian-safe, permission, edible, bloom, harvest.</div>
            </div>
          </div>
          <div class="row">
            <div>
              <label>Accessibility notes (must be literal "unknown")</label>
              <input type="text" name="accessibilityNotes" value="${escapeAttr(draft.accessibilityNotes || 'unknown')}" />
              <div class="hint">The gate requires the literal string <code>unknown</code>.</div>
            </div>
            <div>
              <label>Pedestrian plausibility (must be literal "unknown")</label>
              <input type="text" name="pedestrianPlausibility" value="${escapeAttr(draft.pedestrianPlausibility || 'unknown')}" />
              <div class="hint">The gate requires the literal string <code>unknown</code>.</div>
            </div>
          </div>
          <div class="row full">
            <div>
              <label>Caveats (free-form, optional)</label>
              <textarea name="caveats" placeholder="Anything the human reviewer wants to record as a caveat.">${escapeText((draft.caveats || []).join('\n'))}</textarea>
            </div>
          </div>

          <div id="form-errors"></div>

          <div class="actions">
            <button type="button" id="btn-approve" class="${state.approved.has(c.id) ? 'secondary' : ''}">${state.approved.has(c.id) ? 'Unapprove' : 'Approve & save draft'}</button>
            <button type="button" class="secondary" id="btn-reject">Reject candidate</button>
            <button type="button" class="secondary" id="btn-reset">Reset form</button>
            <span class="spacer" style="flex:1;"></span>
            <span class="status" id="form-status"></span>
          </div>

          <h3 style="font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin: 20px 0 6px;">Compiled trail preview (export anchors derived from first 2 waypoints)</h3>
          <pre class="preview" id="json-preview">${escapeText('{}')}</pre>
        </form>
      `;

      // Wire up
      const form = document.getElementById('approval-form');
      form.addEventListener('input', onFormChange);
      document.getElementById('btn-approve').addEventListener('click', () => toggleApprove(c));
      document.getElementById('btn-reject').addEventListener('click', () => {
        state.drafts.delete(c.id);
        state.approved.delete(c.id);
        renderList();
        renderDrawer(c);
      });
      document.getElementById('btn-reset').addEventListener('click', () => {
        state.drafts.delete(c.id);
        state.approved.delete(c.id);
        renderList();
        renderDrawer(c);
      });
      onFormChange();
    }

    function blankDraft(c) {
      return {
        id: c.id.replace('candidate-', 'trail-'),
        cityId: sourceArtifact.city,
        name: '',
        waypointTreeIds: [...c.waypointTreeIds],
        exportAnchors: c.waypoints.slice(0, 2).map(w => ({
          treeId: w.treeId, latitude: Number(w.latitude), longitude: Number(w.longitude)
        })),
        narrative: '',
        accessibilityNotes: 'unknown',
        pedestrianPlausibility: 'unknown',
        review: { status: 'human-reviewed', reviewer: '', reviewedAt: new Date().toISOString().slice(0, 10) },
        candidateId: c.id,
        candidateGeneratorVersion: generatorVersion,
        sourceSnapshotSha256: sourceArtifact.sourceSnapshotSha256,
        caveats: []
      };
    }

    function readForm(c) {
      const form = document.getElementById('approval-form');
      const data = new FormData(form);
      const draft = blankDraft(c);
      draft.name = String(data.get('name') || '').trim();
      draft.narrative = String(data.get('narrative') || '').trim();
      draft.review.reviewer = String(data.get('reviewer') || '').trim();
      draft.review.reviewedAt = String(data.get('reviewedAt') || '').trim();
      draft.accessibilityNotes = String(data.get('accessibilityNotes') || '').trim();
      draft.pedestrianPlausibility = String(data.get('pedestrianPlausibility') || '').trim();
      const caveats = String(data.get('caveats') || '').trim();
      draft.caveats = caveats ? caveats.split(/\r?\n/).map(s => s.trim()).filter(Boolean) : [];
      return draft;
    }

    function validate(draft) {
      const errors = [];
      if (!draft.name) errors.push('Name is required.');
      if (!draft.review.reviewer) errors.push('Reviewer name is required.');
      if (FORBIDDEN_REVIEWER.test(draft.review.reviewer)) errors.push(`Reviewer name contains a forbidden word (ai/agent/model).`);
      if (!draft.review.reviewedAt) errors.push('Reviewed date is required.');
      if (!draft.narrative) errors.push('Narrative is required.');
      if (FORBIDDEN_NARRATIVE.test(draft.narrative)) errors.push(`Narrative contains a forbidden word (accessible/safe/walkable/walking route/pedestrian-safe/permission/edible/bloom/harvest).`);
      if (draft.accessibilityNotes !== 'unknown') errors.push(`accessibilityNotes must be the literal string "unknown" (got: "${draft.accessibilityNotes}").`);
      if (draft.pedestrianPlausibility !== 'unknown') errors.push(`pedestrianPlausibility must be the literal string "unknown" (got: "${draft.pedestrianPlausibility}").`);
      if (draft.waypointTreeIds.length < 2) errors.push('Need at least 2 waypoints.');
      if (draft.waypointTreeIds.length > 20) errors.push('Maximum 20 waypoints.');
      if (draft.exportAnchors.length < 2) errors.push('Need at least 2 export anchors.');
      if (draft.exportAnchors.length > 5) errors.push('Maximum 5 export anchors.');
      const seen = new Set();
      for (const id of draft.waypointTreeIds) {
        if (seen.has(id)) { errors.push('Duplicate waypoint ID.'); break; }
        seen.add(id);
      }
      return errors;
    }

    function onFormChange() {
      const c = candidates.find(x => x.id === state.activeId);
      if (!c) return;
      const draft = readForm(c);
      const errors = validate(draft);
      const errEl = document.getElementById('form-errors');
      if (errors.length) {
        errEl.innerHTML = '<div class="errors">' + errors.map(e => '• ' + e).join('<br>') + '</div>';
      } else {
        errEl.innerHTML = '';
      }
      // Live hints
      const reviewerHint = document.getElementById('reviewer-hint');
      if (reviewerHint) {
        reviewerHint.classList.toggle('warn', FORBIDDEN_REVIEWER.test(draft.review.reviewer));
        reviewerHint.textContent = FORBIDDEN_REVIEWER.test(draft.review.reviewer)
          ? '⚠ Contains a forbidden word (ai/agent/model).'
          : 'Cannot contain: ai, agent, model.';
      }
      const narrativeHint = document.getElementById('narrative-hint');
      if (narrativeHint) {
        narrativeHint.classList.toggle('warn', FORBIDDEN_NARRATIVE.test(draft.narrative));
        narrativeHint.textContent = FORBIDDEN_NARRATIVE.test(draft.narrative)
          ? '⚠ Contains a forbidden word.'
          : 'Forbidden words: accessible, safe, walkable, walking route, pedestrian-safe, permission, edible, bloom, harvest.';
      }
      // Save draft (always, so the form is recoverable)
      if (draft.name || draft.review.reviewer || draft.narrative) {
        state.drafts.set(c.id, draft);
      } else {
        state.drafts.delete(c.id);
      }
      // Preview
      const preview = document.getElementById('json-preview');
      if (preview) {
        preview.textContent = errors.length
          ? '// fix the errors above before this can be approved'
          : JSON.stringify(draft, null, 2);
      }
      renderList();
    }

    function toggleApprove(c) {
      if (state.approved.has(c.id)) {
        state.approved.delete(c.id);
      } else {
        const draft = readForm(c);
        const errors = validate(draft);
        if (errors.length) {
          alert('Cannot approve: ' + errors.join(' '));
          return;
        }
        state.drafts.set(c.id, draft);
        state.approved.add(c.id);
      }
      renderList();
      renderDrawer(c);
    }

    // ---------- Export ----------
    function buildExport() {
      const trails = [...state.approved].map(id => state.drafts.get(id)).filter(Boolean);
      return {
        schemaVersion: 1,
        cityId: sourceArtifact.city,
        sourceSnapshotSha256: sourceArtifact.sourceSnapshotSha256,
        candidateGeneratorVersion: generatorVersion,
        trails
      };
    }

    document.getElementById('btn-export').addEventListener('click', () => {
      const out = buildExport();
      const blob = new Blob([JSON.stringify(out, null, 2) + '\n'], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'trails-review.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if (!confirm('Clear ALL drafts and approvals? This cannot be undone.')) return;
      state.drafts.clear();
      state.approved.clear();
      const c = candidates.find(x => x.id === state.activeId);
      renderList();
      if (c) renderDrawer(c);
    });

    // ---------- Helpers ----------
    function escapeText(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeAttr(s) {
      return escapeText(s).replace(/"/g, '&quot;');
    }
  })();
  </script>
</body>
</html>
